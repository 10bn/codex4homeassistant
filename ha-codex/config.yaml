name: HA Codex
slug: ha_codex
version: 0.1.0
description: Ingress add-on for exploring Home Assistant config/state with a safe read-focused UI.
url: https://github.com/10bn/codex4homeassistant
startup: services
boot: auto
arch:
  - amd64
  - aarch64
ingress: true
ingress_stream: true
ingress_port: 8099
panel_icon: mdi:robot
panel_title: HA Codex
homeassistant_api: true
map:
  - type: homeassistant_config
    read_only: false
options:
  debug: false
  max_entities: 250
  allow_test_write: false
  test_write_filename: ha_codex_test.txt
schema:
  debug: bool
  max_entities: int(10,2000)
  allow_test_write: bool
  test_write_filename: str?
init: false
